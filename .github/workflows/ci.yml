name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: mysql://mailadmin:mailadmin@127.0.0.1:3306/mailadmin

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: mysql://mailadmin:mailadmin@127.0.0.1:3306/mailadmin
          MAILADMIN_DRIVER: database
          AUTH_SECRET: ci-secret
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin123
          APP_URL: http://localhost:3000
