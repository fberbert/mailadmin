services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://mailadmin:mailadmin@db:3306/mailadmin
      PRISMA_DATABASE_URL: mysql://mailadmin:mailadmin@db:3306/mailadmin
      MAILADMIN_DATABASE_URL: mysql://mailadmin:mailadmin@db:3306/mailadmin
      MAILADMIN_DRIVER: database
      AUTH_SECRET: dev-secret-change-me
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      APP_URL: http://localhost:3000
    volumes:
      - .:/app
      - mailadmin-node-modules:/app/node_modules
      - mailadmin-next-cache:/app/.next
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -lc "npm install &&
      npx prisma generate &&
      npx prisma db push &&
      npm run db:seed &&
      npm run dev -- --hostname 0.0.0.0"

  db:
    image: mysql:8.4
    ports:
      - "3406:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mailadmin
      MYSQL_USER: mailadmin
      MYSQL_PASSWORD: mailadmin
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mailadmin-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mailadmin-node-modules:
  mailadmin-next-cache:
  mailadmin-mysql-data:
